services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trendmap
      POSTGRES_USER: trendmap
      POSTGRES_PASSWORD: trendmap
    ports:
      - "5432:5432"
    volumes:
      - trendmap_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendmap -d trendmap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trendmap_postgres_data:
